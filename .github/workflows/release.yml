name: Release Obsidian plugin

on:
  push:
    tags:
      # Obsidian's submission rules require unprefixed semver tags (e.g. 1.0.0,
      # not v1.0.0). The pattern matches both unprefixed and v-prefixed tags
      # so a slip-up doesn't silently fail to release.
      - "[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Pin npm
        run: npm install -g npm@10

      - name: Install dependencies
        # Two GitHub-Actions–specific quirks worked around here:
        #   1. Pinned npm@10 above (Node 22 ships npm 10.9.x; some patch
        #      versions hit the "Exit handler never called!" bug on Linux
        #      runners. Pinning to npm 10 stable avoids it.)
        #   2. `--ignore-scripts` skips esbuild's postinstall, which has
        #      been the specific hang point. The platform-specific binary
        #      is delivered via optionalDependencies regardless of scripts,
        #      so the bundler still works.
        run: npm install --no-audit --no-fund --no-progress --ignore-scripts

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify manifest version matches tag
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          tag="${tag#v}"
          manifest_version="$(jq -r .version manifest.json)"
          if [ "$tag" != "$manifest_version" ]; then
            echo "Tag '$tag' does not match manifest.json version '$manifest_version'." >&2
            exit 1
          fi

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title "$tag" \
            --draft \
            --generate-notes \
            main.js manifest.json

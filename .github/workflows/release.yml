name: Release Obsidian plugin

on:
  push:
    tags:
      # Obsidian's submission rules require unprefixed semver tags (e.g. 1.0.0,
      # not v1.0.0). The pattern matches both unprefixed and v-prefixed tags
      # so a slip-up doesn't silently fail to release.
      - "[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        # pnpm replaces npm here. Earlier runs reproducibly hit npm's
        # "Exit handler never called!" internal bug on the Linux runner
        # regardless of npm version, install flags, or postinstall scripts.
        # pnpm's resolver doesn't have this issue.
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        # Same rules ObsidianReviewBot runs (eslint-plugin-obsidianmd).
        # Failing here is a hard stop — the marketplace bot would block
        # the submission anyway.
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build

      - name: Verify manifest version matches tag
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          tag="${tag#v}"
          manifest_version="$(jq -r .version manifest.json)"
          if [ "$tag" != "$manifest_version" ]; then
            echo "Tag '$tag' does not match manifest.json version '$manifest_version'." >&2
            exit 1
          fi

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title "$tag" \
            --draft \
            --generate-notes \
            main.js manifest.json
